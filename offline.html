<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#082f49">
  <title>Aqua Fantasia Offline</title>
  <style>
    :root{color-scheme:dark} body{margin:0;min-height:100svh;display:grid;place-items:center;padding:24px;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:white;background:radial-gradient(circle at 50% 0%,rgba(103,232,249,.22),transparent 18rem),linear-gradient(180deg,#082f49,#020617)}
    main{max-width:380px;text-align:center;padding:28px;border:1px solid rgba(255,255,255,.14);border-radius:32px;background:rgba(255,255,255,.10);box-shadow:0 24px 70px rgba(0,0,0,.35);backdrop-filter:blur(18px)}
    .icon{font-size:5rem;filter:drop-shadow(0 18px 28px rgba(34,211,238,.25))} h1{font-size:2rem;margin:.4rem 0;font-weight:900;letter-spacing:-.06em} p{color:rgba(255,255,255,.72);line-height:1.6} button{border:0;border-radius:999px;padding:14px 20px;font-weight:800;background:#38bdf8;color:#082f49;box-shadow:0 14px 32px rgba(56,189,248,.25)}
  </style>
</head>
<body>
  <main>
    <div class="icon">🎣</div>
    <h1>오프라인 항해 중</h1>
    <p>네트워크가 잠시 끊겼습니다. 이미 캐시된 게임 파일은 다시 열 수 있고, 플레이 데이터는 로컬 저장소에 안전하게 남습니다.</p>
    <button onclick="location.href='./'">Aqua Fantasia 다시 열기</button>
  </main>
</body>
</html>
