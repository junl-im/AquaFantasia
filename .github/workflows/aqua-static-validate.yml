name: AquaFantasia Manual Static Validate

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: manual-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Install
        run: npm install
      - name: Static validate
        run: npm run validate
      - name: Typecheck
        run: npm run typecheck
      - name: Runtime checks
        run: npm run runtime:check
      - name: Bundle audit
        run: npm run audit
      - name: Atlas check
        run: npm run atlas:check
      - name: Renderer checks
        run: npm run renderer:check
      - name: Clean report
        run: npm run clean:report
