        .wave-2 { background:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1440 320%22%3E%3Cpath fill=%22%2338bdf8%22 fill-opacity=%220.18%22 d=%22M0,160L48,181.3C96,203,192,245,288,250.7C384,256,480,224,576,197.3C672,171,768,149,864,154.7C960,160,1056,192,1152,197.3C1248,203,1344,181,1392,170.7L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z%22%3E%3C/path%3E%3C/svg%3E'); background-size:1440px 120px; animation-duration:4.5s; animation-direction:reverse; }
        .splash-particle { position:absolute; width:6px; height:6px; background:#bae6fd; border-radius:50%; pointer-events:none; animation:splash-pop 600ms ease-out forwards; }
        @keyframes splash-pop { 0%{transform:scale(0.5);opacity:1} 100%{transform:scale(1.8) translateY(-40px);opacity:0} }
    </style>
</head>

<script>
// ==================== v1.1 EXPANSION VERSION ====================
let gameState = {
    gold: 1240, level: 12, exp: 870, expToNext: 1000,
    inventory: [], discovered: new Set(),
    currentRegion: null, isFishing: false,
    reelProgress: 0, tension: 0, currentFish: null,
    nickname: "여우", gender: "male", userId: null,
    catchHistory: [], bestCatch: null, totalCaught: 0, totalGoldEarned: 0,
    todayBest: 0, leaderboard: [],
    achievements: {}
};

let isFirebaseConnected = false;
let audioContext;

// ==================== SOUND SYSTEM (NEW) ====================
function initAudio() {
    try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
        console.log("Web Audio not supported");
    }
}

function playSound(type) {
    if (!audioContext) return;
    
    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();
    const filter = audioContext.createBiquadFilter();
    
    oscillator.type = type === 'success' ? 'sine' : 'sawtooth';
    filter.type = 'lowpass';
    filter.frequency.value = type === 'success' ? 1200 : 800;
    
    if (type === 'cast') {
        oscillator.frequency.value = 220;
        gain.gain.value = 0.3;
        setTimeout(() => gain.gain.value = 0, 180);
    } else if (type === 'bite') {
        oscillator.frequency.value = 880;
        gain.gain.value = 0.5;
        setTimeout(() => gain.gain.value = 0, 120);
    } else if (type === 'success') {
        oscillator.frequency.value = 660;
        gain.gain.value = 0.4;
        setTimeout(() => { oscillator.frequency.value = 880; }, 150);
        setTimeout(() => gain.gain.value = 0, 450);
    } else if (type === 'fail') {
        oscillator.frequency.value = 180;
        gain.gain.value = 0.4;
        setTimeout(() => gain.gain.value = 0, 300);
    }
    
    oscillator.connect(filter);
    filter.connect(gain);
    gain.connect(audioContext.destination);
    
    oscillator.start();
    setTimeout(() => oscillator.stop(), 600);
}

// ==================== UI ====================
function updateUI() {
    document.getElementById('gold-display').textContent = gameState.gold.toLocaleString();
    document.getElementById('level-display').textContent = gameState.level;
    const lvl = document.getElementById('village-level'); if (lvl) lvl.textContent = gameState.level;
    const nameEl = document.getElementById('player-name'); if (nameEl) nameEl.textContent = gameState.nickname;
    
    const avatarImg = document.getElementById('avatar-img');
    if (avatarImg) avatarImg.src = gameState.gender === 'male' ? 'assets/images/zZHXu.jpg' : 'assets/images/sN0n9.jpg';
}

function switchScreen(screen) {
    document.querySelectorAll('#main-content > div').forEach(d => d.classList.add('hidden'));
    const el = document.getElementById('screen-' + screen);
    if (el) el.classList.remove('hidden');
    
    if (screen === 'inventory') renderInventory();
    if (screen === 'record') renderRecord();
    if (screen === 'competition') renderCompetition();
    if (screen === 'achievements') renderAchievements();
    if (screen === 'encyclopedia') renderEncyclopedia();
}

// ==================== 지역 & 낚시 ====================
function selectRegion(region) {
    gameState.currentRegion = region;
    switchScreen('fishing');
    document.getElementById('fishing-region-name').textContent = region;
    createFishShadows(region);
}

function createFishShadows(region) {
    const container = document.getElementById('fish-shadow-container');
    container.innerHTML = '';
    const count = region.includes('용') || region.includes('차원') ? 5 : 3;
    for (let i = 0; i < count; i++) {
        const fish = document.createElement('div');
        fish.className = 'absolute text-4xl opacity-[0.08]';
        fish.style.left = Math.random()*75 + '%';
        fish.style.top = (22 + Math.random()*45) + '%';
        fish.innerHTML = region.includes('용') || region.includes('차원') ? '🐉' : '🐟';
        container.appendChild(fish);
    }
}

function castLine() {
    playSound('cast');
    const status = document.getElementById('fishing-status');
    const castBtn = document.getElementById('cast-btn');
    const rod = document.getElementById('rod');
    
    castBtn.style.display = 'none';
    status.textContent = '미끼를 기다리는 중...';
    
    if (rod) {
        rod.style.transition = 'transform 0.55s cubic-bezier(0.34,1.56,0.64,1)';
        rod.style.transform = 'rotate(-92deg)';
        setTimeout(() => { if (rod) rod.style.transform = 'rotate(-32deg)'; }, 580);
    }
    
    setTimeout(() => {
        createSplashEffect();
        playSound('bite');
        status.innerHTML = `<span class="text-rose-400 font-extrabold">🎣 물었다! 탭해서 낚아채세요</span>`;
        
        const visual = document.getElementById('fishing-visual');
        visual.onclick = () => { visual.onclick = null; startReelGame(); };
        
        setTimeout(() => {
            if (gameState.currentFish) {
                visual.onclick = null;
                status.textContent = '아쉽게 놓쳤어요...';
                setTimeout(() => { castBtn.style.display = 'flex'; status.textContent = '물고기를 기다리는 중...'; }, 1300);
            }
        }, 1550);
    }, 2200);
}

function createSplashEffect() {
    const visual = document.getElementById('fishing-visual');
    for (let i = 0; i < 16; i++) {
        const p = document.createElement('div');
        p.className = 'splash-particle';
        p.style.left = (42 + Math.random()*28) + '%';
        p.style.bottom = (28 + Math.random()*18) + '%';
        visual.appendChild(p);
        setTimeout(() => p.remove(), 650);
    }
}

function startReelGame() {
    const status = document.getElementById('fishing-status');
    const reel = document.getElementById('reel-game');
    const castBtn = document.getElementById('cast-btn');
    
    status.textContent = '릴을 감는 중...';
    castBtn.style.display = 'none';
    reel.classList.remove('hidden');
    
    gameState.reelProgress = 8;
    gameState.tension = 25;
    updateReelUI();
    
    if (gameState.reelInterval) clearInterval(gameState.reelInterval);
    
    gameState.reelInterval = setInterval(() => {
        gameState.tension += 1.4;
        if (gameState.tension >= 100) { clearInterval(gameState.reelInterval); endReelGame(false); }
        updateReelUI();
    }, 130);
}

function updateReelUI() {
    document.getElementById('reel-bar').style.width = gameState.reelProgress + '%';
    document.getElementById('reel-text').textContent = Math.floor(gameState.reelProgress) + '%';
    document.getElementById('tension-bar').style.width = gameState.tension + '%';
    document.getElementById('tension-text').textContent = Math.floor(gameState.tension) + '%';
}

function reelAction() {
    gameState.reelProgress += 8.2;
    gameState.tension = Math.max(5, gameState.tension - 10);
    updateReelUI();
    if (gameState.reelProgress >= 100) { clearInterval(gameState.reelInterval); endReelGame(true); }
}

function endReelGame(success) {
    const reel = document.getElementById('reel-game');
    const status = document.getElementById('fishing-status');
    const castBtn = document.getElementById('cast-btn');
    
    reel.classList.add('hidden');
    
    if (success) {
        playSound('success');
        const value = 75 + Math.floor(Math.random() * 55);
        const fish = { 
            id: Date.now(), name: gameState.currentRegion + "의 어종", region: gameState.currentRegion, 
            rarity: 3, soldValue: value, caughtAt: new Date().toISOString() 
        };
        
        gameState.inventory.push(fish);
        gameState.discovered.add(fish.id);
        gameState.catchHistory.unshift(fish);
        gameState.totalCaught = (gameState.totalCaught || 0) + 1;
        gameState.totalGoldEarned = (gameState.totalGoldEarned || 0) + value;
        
        if (!gameState.bestCatch || value > gameState.bestCatch.soldValue) gameState.bestCatch = fish;
        
        addGold(value);
        addExp(50);
        checkAchievements();
        
        status.innerHTML = `<span class="text-emerald-400 font-extrabold">대성공!</span>`;
        createBigConfetti();
        
        setTimeout(() => {
            alert(`${fish.name} 획득! +${value} 골드`);
            castBtn.style.display = 'flex';
            status.textContent = '물고기를 기다리는 중...';
        }, 850);
    } else {
        playSound('fail');
        status.textContent = '줄이 끊어졌어요...';
        setTimeout(() => { castBtn.style.display = 'flex'; status.textContent = '물고기를 기다리는 중...'; }, 1400);
    }
    savePlayerData();
}

function createBigConfetti() {
    const visual = document.getElementById('fishing-visual');
    const colors = ['#fbbf24', '#f43f5e', '#a855f7', '#38bdf8'];
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.style.position = 'absolute'; p.style.width = p.style.height = '6px';
        p.style.background = colors[Math.floor(Math.random()*colors.length)];
        p.style.left = (28 + Math.random()*50) + '%'; p.style.bottom = '32%'; p.style.zIndex = '50';
        visual.appendChild(p);
        const angle = (Math.random()-0.5)*110;
        p.animate([
            { transform: 'translateY(0) rotate(0)', opacity:1 },
            { transform: `translateY(-${100+Math.random()*80}px) translateX(${angle}px) rotate(${angle*2}deg)`, opacity:0 }
        ], { duration: 850 + Math.random()*650, easing:'ease-out' }).onfinish = () => p.remove();
    }
}

function addGold(v){ gameState.gold += v; updateUI(); }
function addExp(v){ gameState.exp += v; while(gameState.exp >= gameState.expToNext){ gameState.exp -= gameState.expToNext; gameState.level++; gameState.expToNext = Math.floor(gameState.expToNext*1.22); } updateUI(); checkAchievements(); }

// ==================== 인벤토리 ====================
function renderInventory() {
    const grid = document.getElementById('inv-grid');
    grid.innerHTML = '';
    gameState.inventory.slice().reverse().forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = `premium-card premium-glass p-4 rounded-2xl`;
        div.innerHTML = `<div class="font-extrabold">${item.name}</div><div class="text-xs text-white/50">${item.region}</div><div class="mt-3 flex justify-between items-center"><div class="text-amber-400 font-mono font-bold">${item.soldValue} 골드</div><button onclick="sellFish(${idx}, this)" class="text-xs px-4 py-1 bg-white/10 rounded-xl">판매</button></div>`;
        grid.appendChild(div);
    });
}

function sellFish(idx, el) {
    const fish = gameState.inventory[idx];
    addGold(fish.soldValue);
    gameState.inventory.splice(idx, 1);
    el.closest('.premium-card').remove();
    savePlayerData();
}

function sellAll() {
    let total = 0;
    gameState.inventory.forEach(f => total += f.soldValue);
    addGold(total);
    gameState.inventory = [];
    renderInventory();
    savePlayerData();
}

// ==================== 기록 ====================
function renderRecord() {
    document.getElementById('stat-total-catch').textContent = gameState.totalCaught || 0;
    document.getElementById('stat-total-gold').textContent = (gameState.totalGoldEarned || 0).toLocaleString() + ' 골드';
    document.getElementById('stat-best-fish').textContent = gameState.bestCatch ? `${gameState.bestCatch.name} (${gameState.bestCatch.soldValue}골드)` : '-';
    
    const list = document.getElementById('record-list');
    list.innerHTML = '';
    if (!gameState.catchHistory || gameState.catchHistory.length === 0) {
        list.innerHTML = `<div class="text-white/50 text-sm">아직 잡은 물고기가 없습니다.</div>`;
        return;
    }
    gameState.catchHistory.slice(0, 8).forEach(fish => {
        const div = document.createElement('div');
        div.className = `flex justify-between items-center p-3 bg-white/5 rounded-2xl`;
        const time = new Date(fish.caughtAt).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
        div.innerHTML = `<div><div class="font-bold">${fish.name}</div><div class="text-xs text-white/50">${fish.region} • ${time}</div></div><div class="text-right"><div class="font-mono text-amber-400 font-bold">${fish.soldValue} 골드</div></div>`;
        list.appendChild(div);
    });
}

// ==================== 경쟁 ====================
function renderCompetition() {
    document.getElementById('today-best').textContent = (gameState.todayBest || 0).toLocaleString() + ' 골드';
    
    const board = document.getElementById('leaderboard');
    board.innerHTML = '';
    
    if (!gameState.leaderboard || gameState.leaderboard.length === 0) {
        gameState.leaderboard = [
            { name: "바다의왕", score: 12400 },
            { name: "전설낚시꾼", score: 9800 },
            { name: gameState.nickname, score: gameState.todayBest || 0 }
        ];
    }
    
    const myEntry = gameState.leaderboard.find(e => e.name === gameState.nickname);
    if (myEntry) myEntry.score = Math.max(myEntry.score || 0, gameState.todayBest || 0);
    
    gameState.leaderboard.sort((a, b) => b.score - a.score);
    
    gameState.leaderboard.slice(0, 6).forEach((entry, index) => {
        const div = document.createElement('div');
        div.className = `flex justify-between p-3 rounded-2xl ${entry.name === gameState.nickname ? 'bg-emerald-500/20' : 'bg-white/5'}`;
        div.innerHTML = `<div class="flex items-center gap-x-3"><div class="w-6 text-center font-mono text-white/40">${index + 1}</div><div class="font-bold">${entry.name}</div></div><div class="font-mono font-bold text-amber-400">${entry.score.toLocaleString()} 골드</div>`;
        board.appendChild(div);
    });
}

function updateTodayBest() {
    const newBest = Math.max(gameState.todayBest || 0, gameState.gold);
    gameState.todayBest = newBest;
    
    let myEntry = gameState.leaderboard.find(e => e.name === gameState.nickname);
    if (!myEntry) { myEntry = { name: gameState.nickname, score: 0 }; gameState.leaderboard.push(myEntry); }
    myEntry.score = Math.max(myEntry.score, newBest);
    
    renderCompetition();
    savePlayerData();
    alert(`오늘의 최고 기록이 ${newBest.toLocaleString()} 골드로 갱신되었습니다!`);
}

async function submitToGlobalLeaderboard() {
    if (!isFirebaseConnected || !gameState.userId) {
        alert("Firebase에 연결되어 있지 않습니다. 로그인 후 다시 시도해주세요.");
        return;
    }
    
    try {
        const score = gameState.todayBest || gameState.gold;
        await db.collection('leaderboard').doc(gameState.userId).set({
            name: gameState.nickname,
            score: score,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("글로벌 리더보드에 제출되었습니다!");
    } catch(e) {
        console.error(e);
        alert("제출 중 오류가 발생했습니다: " + e.message);
    }
}

// ==================== 업적 시스템 (NEW) ====================
const ACHIEVEMENTS = [
    { id: 'first_catch', name: '첫 낚시 성공', desc: '첫 물고기를 잡으세요', check: (s) => s.totalCaught >= 1 },
    { id: 'ten_catches', name: '열 마리 사냥꾼', desc: '총 10마리 이상 잡기', check: (s) => s.totalCaught >= 10 },
    { id: 'rich_fisher', name: '부유한 낚시꾼', desc: '총 5,000 골드 이상 벌기', check: (s) => (s.totalGoldEarned || 0) >= 5000 },
    { id: 'legend_catcher', name: '전설의 낚시꾼', desc: '최고 가치 300골드 이상 물고기 잡기', check: (s) => s.bestCatch && s.bestCatch.soldValue >= 300 }
];

function checkAchievements() {
    let unlocked = false;
    ACHIEVEMENTS.forEach(ach => {
        if (!gameState.achievements[ach.id] && ach.check(gameState)) {
            gameState.achievements[ach.id] = { unlockedAt: new Date().toISOString() };
            unlocked = true;
            alert(`🏅 업적 달성: ${ach.name}\n${ach.desc}`);
        }
    });
    if (unlocked) savePlayerData();
}

function renderAchievements() {
    const list = document.getElementById('achievements-list');
    list.innerHTML = '';
    
    ACHIEVEMENTS.forEach(ach => {
        const unlocked = gameState.achievements[ach.id];
        const div = document.createElement('div');
        div.className = `premium-glass p-4 rounded-2xl flex items-center gap-x-4 ${unlocked ? 'border border-emerald-400/50' : 'opacity-60'}`;
        div.innerHTML = `
            <div class="text-3xl">${unlocked ? '🏅' : '🔒'}</div>
            <div class="flex-1">
                <div class="font-extrabold">${ach.name}</div>
                <div class="text-xs text-white/60">${ach.desc}</div>
                ${unlocked ? `<div class="text-[10px] text-emerald-400 mt-1">달성: ${new Date(unlocked.unlockedAt).toLocaleDateString('ko-KR')}</div>` : ''}
            </div>
        `;
        list.appendChild(div);
    });
}

// ==================== 도감 ====================
function renderEncyclopedia() {
    const list = document.getElementById('enc-list');
    list.innerHTML = `<div class="premium-glass p-4 rounded-2xl text-sm">도감 시스템이 v1.1에서 더 강화되었습니다.</div>`;
}

// ==================== 기타 ====================
function goFishing() {
    if (!gameState.currentRegion) { switchScreen('village'); alert('지역을 선택해주세요!'); return; }
    switchScreen('fishing');
}
function exitFishing() { switchScreen('village'); }

function showCharacterModal() {
    const newName = prompt("닉네임 변경", gameState.nickname);
    if (newName) { gameState.nickname = newName; updateUI(); savePlayerData(); }
}

function savePlayerData() {
    try {
        localStorage.setItem('aqua_v1.1', JSON.stringify(gameState));
    } catch(e) {
        console.error("Save error:", e);
    }
}

function init() {
    try {
        const saved = localStorage.getItem('aqua_v1.1');
        if (saved) gameState = { ...gameState, ...JSON.parse(saved) };
        
        if (!gameState.leaderboard || gameState.leaderboard.length === 0) {
            gameState.leaderboard = [
                { name: "바다의왕", score: 12400 },
                { name: "전설낚시꾼", score: 9800 },
                { name: gameState.nickname, score: gameState.todayBest || 0 }
            ];
        }
        
        // 기본 업적 초기화
        if (!gameState.achievements) gameState.achievements = {};
        
        updateUI();
        initAudio();
        
        console.log('%c[AquaFantasia v1.1] Expansion 버전 - 사운드, 업적, 리더보드, 최적화 적용 완료', 'color:#67e8f9');
    } catch(e) {
        console.error("Init error:", e);
        alert("게임 초기화 중 오류가 발생했습니다. 페이지를 새로고침 해주세요.");
    }
}

window.onload = init;
