name: Aqua Fantasia Static Validation Manual Only

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Runtime versions
        run: |
          node --version
          npm --version
      - name: Install dependencies
        run: npm install
      - name: Static validation
        run: npm run validate
      - name: TypeScript check
        run: npm run typecheck
      - name: Runtime checks
        run: npm run runtime:check
      - name: Bundle audit
        run: npm run audit
      - name: Atlas check
        run: npm run atlas:check
      - name: Duplicate automatic workflow disabled
        run: |
          echo "This workflow is manual-only. Push validation and deploy run in .github/workflows/pages.yml."
