name: validate-and-deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Force public npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config get registry

      - name: Guard package-lock registry
        run: |
          node -e "const fs=require('fs'); const lock=fs.readFileSync('package-lock.json','utf8'); const bad=['applied-caas','artifactory','internal.api.openai','10.192.']; const hit=bad.find((token)=>lock.includes(token)); if(hit){ console.error('Forbidden internal registry token in package-lock:', hit); process.exit(1); } console.log('package-lock registry check passed');"

      - name: Install
        run: npm run ci:install

      - name: Static validate
        run: npm run validate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
