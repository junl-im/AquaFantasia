name: Aqua Static Validate Manual

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Install
        run: npm install
      - name: Static validate
        run: npm run validate
      - name: Runtime checks
        run: npm run runtime:check
      - name: Renderer checks
        run: npm run renderer:check
      - name: Bundle audit
        run: npm run audit
