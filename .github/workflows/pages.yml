name: Aqua Fantasia Validate & Deploy Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: aqua-fantasia-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Runtime versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Static validation
        run: npm run validate

      - name: TypeScript check
        run: npm run typecheck

      - name: Runtime checks
        run: npm run runtime:check

      - name: Renderer checks
        run: npm run renderer:check

      - name: Bundle audit
        run: npm run audit

      - name: Atlas check
        run: npm run atlas:check

      - name: Clean bundle report
        run: npm run clean:report

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
